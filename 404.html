<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Page Not Found — ACSO Consulting</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0F1B2D;
  --blue: #3B82F6;
  --green: #10B981;
  --green-dark: #059669;
  --ink: #E8EDF4;
  --ink-mid: #A8BBCF;
  --ink-light: #6B82A0;
  --radius: 8px;
  --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
body {
  font-family: var(--font);
  background: var(--navy);
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}
.box { text-align: center; max-width: 440px; }
.code {
  font-size: 4rem;
  font-weight: 800;
  color: var(--blue);
  letter-spacing: -0.04em;
  line-height: 1;
  margin-bottom: 16px;
}
h1 {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 12px;
}
p {
  color: var(--ink-mid);
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 28px;
}
a.back {
  display: inline-block;
  background: var(--green);
  color: #fff;
  font-size: 0.92rem;
  font-weight: 700;
  padding: 13px 26px;
  border-radius: var(--radius);
  text-decoration: none;
  transition: background .2s;
}
a.back:hover { background: var(--green-dark); }
</style>
</head>
<body>
<div class="box">
  <div class="code">404</div>
  <h1>This page does not exist.</h1>
  <p>The page you are looking for may have been moved or removed. If you arrived here from a link, let us know at info@acsoconsulting.com.</p>
  <a href="/" class="back">Back to ACSO Consulting</a>
</div>
</body>
</html>
